services:
    # frontend:
    #     build: ./nextjs-ui
    #     ports:
    #         - "3000:3000"
    #     environment:
    #         - NEXT_PUBLIC_SERVER_HOST=http://backend:4000
    #     depends_on:
    #         - backend

    backend:
        build: ./express-server
        ports:
            - "4000:4000"
        environment:
            - DATABASE_URL=postgres://postgres:password123@db:5432/express-ecom
        depends_on:
            - db

    db:
        image: postgres
        container_name: functional-ecom
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password123
            POSTGRES_DB: express-ecom
        ports:
            - "5433:5432"
        volumes:
            - psql:/var/lib/postgresql

volumes:
    psql:
